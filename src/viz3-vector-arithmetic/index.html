<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可视化 3 — King − Man + Woman = Queen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1c1c1c;
      font-family: 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    a.nav-back {
      position: fixed; top: 16px; left: 16px;
      text-decoration: none; color: #888; font-size: 14px;
    }
    a.nav-back:hover { color: #F4D03F; }
    h1 { font-size: 22px; font-weight: 300; margin: 20px 0 6px; color: #ccc; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 16px; }
    #container {
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }
    .formula-bar {
      margin-top: 20px;
      font-size: 28px;
      font-weight: 300;
      color: #888;
      text-align: center;
      min-height: 40px;
      transition: all 0.5s;
    }
    .formula-bar .king { color: #F4D03F; }
    .formula-bar .man { color: #FC6255; }
    .formula-bar .woman { color: #83C167; }
    .formula-bar .queen { color: #58C4DD; }
    .formula-bar .op { color: #888; margin: 0 6px; }
    .formula-bar .approx { color: #888; margin: 0 6px; font-size: 24px; }
    .step-info {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
      text-align: center;
      min-height: 22px;
    }
    .controls {
      margin-top: 16px;
      display: flex;
      gap: 12px;
    }
    button {
      padding: 8px 20px;
      background: #333; border: 1px solid #555;
      border-radius: 6px; color: #fff;
      cursor: pointer; font-size: 14px;
      transition: all 0.2s;
    }
    button:hover { background: #444; border-color: #F4D03F; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <a class="nav-back" href="../../index.html">← 返回目录</a>
  <h1>向量算术：King − Man + Woman ≈ Queen</h1>
  <p class="subtitle">词之间的方向关系编码了语义</p>

  <div id="container"></div>

  <div class="formula-bar" id="formula"></div>
  <div class="step-info" id="stepInfo"></div>

  <div class="controls">
    <button id="playBtn">▶ 播放</button>
    <button id="nextBtn">下一步 →</button>
    <button id="resetBtn">重置</button>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
