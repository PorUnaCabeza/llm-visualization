<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可视化 2 — 词怎么变成向量</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #faf7f0;
      font-family: 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #1c1c1c;
      display: flex;
      flex-direction: column;
    }
    a.nav-back {
      position: fixed; top: 12px; left: 16px; z-index: 10;
      text-decoration: none; color: #666; font-size: 14px;
    }
    a.nav-back:hover { color: #1F6F89; }

    #container {
      flex: 1 1 0;
      min-height: 0;
    }

    .overlay {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 16px 14px;
      background: linear-gradient(transparent, rgba(250,247,240,0.85) 40%);
      pointer-events: none; z-index: 10;
    }
    .overlay > * { pointer-events: auto; }

    .step-info {
      font-size: 15px;
      color: #444;
      text-align: center;
      min-height: 22px;
      max-width: 780px;
    }
    .controls {
      margin-top: 8px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    button {
      padding: 8px 20px;
      background: #ffffff; border: 1px solid #bfb6a0;
      border-radius: 6px; color: #1c1c1c;
      cursor: pointer; font-size: 14px;
      transition: all 0.2s;
      box-shadow: 0 2px 6px rgba(120,100,60,0.08);
    }
    button:hover { background: #f5f0e3; border-color: #1F6F89; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .hint { font-size: 11px; color: #888; margin-top: 4px; }

    /* training-state toggle (only visible on step 3) */
    #trainToggle {
      background: #eaf2e3; border-color: #83C167; color: #3F7A26;
    }
    #trainToggle:hover { background: #def0d2; border-color: #3F7A26; }
    #trainToggle.untrained {
      background: #fbe4e2; border-color: #FC6255; color: #b73b30;
    }
    #trainToggle.untrained:hover { background: #f8d3d0; border-color: #b73b30; }
  </style>
</head>
<body>
  <a class="nav-back" href="../../index.html">← 返回目录</a>

  <div id="container"></div>

  <div class="overlay">
    <div class="step-info" id="stepInfo"></div>
    <div class="controls">
      <button id="playBtn">▶ 播放</button>
      <button id="prevBtn">← 上一步</button>
      <button id="nextBtn">下一步 →</button>
      <button id="resetBtn">重置</button>
      <button id="trainToggle" style="display:none;">当前：训练后 ↺</button>
    </div>
    <p class="hint">左键拖拽旋转 · 右键拖拽平移（触控板：双指点按拖拽）· 方向键↑↓←→平移 · 滚轮缩放</p>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
